<div class="d-flex align-items-start justify-content-between flex-wrap gap-2 mb-3">
    <div>
      <div class="text-muted small">A quick health check before diving into details.</div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-12 col-md-4">
      <div class="border rounded-3 p-3 h-100">
        <div class="text-muted small">Rows</div>
        <div class="display-6 mb-0">{{ result.row_count }}</div>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="border rounded-3 p-3 h-100">
        <div class="text-muted small">Columns</div>
        <div class="display-6 mb-0">{{ result.column_count }}</div>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="border rounded-3 p-3 h-100">
        <div class="text-muted small">Anomalies</div>
        <div class="display-6 mb-0">{{ result.anomaly_summary.anomaly_count }}</div>
        <div class="text-muted small">
          Rate: {{ (result.anomaly_summary.anomaly_rate * 100) | number:'1.0-2' }}%
        </div>
      </div>
    </div>

    <div class="col-12">
      <div class="border rounded-3 p-3">
        <div class="fw-semibold mb-2">Attributes analyzed</div>
        <div class="d-flex flex-wrap gap-2">
          <span class="badge text-bg-light border" *ngFor="let c of result.attr_cols">
            {{ c }}
          </span>
        </div>
      </div>
    </div>
  </div>
