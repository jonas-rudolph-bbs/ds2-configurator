<div *ngIf="((rules$ | async)?.length ?? 0) > 0" class="adoption-panel">
  <div class="card shadow-sm">
    <div class="card-header" (click)="toggle()">
      <h5 class="card-title mb-0">
        Adopted rules ({{ (rules$ | async)?.length ?? 0 }})
      </h5>
    </div>

    <div class="card-body" [class.flash-adoption]="flashBody">
      <div class="rule-list">
        <div *ngFor="let rule of (rules$ | async)" class="rule-row">

          <span class="column">{{rule.column}}</span>

          <span class="label">
            {{rule.previewLabel}}
          </span>

          <button class="btn btn-transparent trash-button" (click)="removeRule(rule.id)">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash"
              viewBox="0 0 16 16">
              <path
                d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z" />
              <path
                d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-1１z" />
            </svg>
          </button>

        </div>

      </div>

      <div class="panel-actions">
        <button class="btn-sm btn-ds2" (click)="clearAll()">
          Clear all
        </button>

        <button class="btn-sm btn-ds2" (click)="openConfig()">
          Open as configuration
        </button>

      </div>





    </div>







  </div>
</div>
